<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS display property</title>
    <style>
        div{
            border: 2px solid black;
        }
        span{
            border: 2px solid pink;
        }
        *{
            margin: 0;
            padding: 0;
        }
        .box{
            border: 2px solid blue;
            display: inline;
            /* pehle puri width le rha tha inline ke baad jitni need utni space le rha width ki */
        }
        .margin{
            border: 2px solid brown;
            display: inline-block;
            margin: 25px;
            padding: 25px;
            /* agar display sirf inline rakhte toh upar margin aur padding add nhi hota 5:07 if confuse */
          /* incline block ki wajah se iski width wagera sab change kr skte */
        }
        .box1{
            border: 2px solid purple;
            /* display: none; */
            /* display none se sab gayab hojayega */
            visibility: hidden;
            /* visibility hidden se bas space rahega baki waha kuch nhi dikhega sab gayab */
        }
    </style>
</head>
<body>
    <div class="box">
        i am a box
    </div>
    <div class="box1">
        i am a box1
    </div>
    
    <div>
        also a nice box
    </div>
    <div class="margin">
        i am checking margin and padding
    </div>
    <!-- div alag line me ayega -->
     <!-- div puri width leleta -->
     <span>
        i am a boy
     </span>
     <span>
        good one as that
     </span>
     <!-- span ek hi line me ayega -->
      <!-- span ko jitni need hai utni hi width leta -->
</body>
</html>
