<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS sizing units</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .box{
            box-sizing: border-box;
          border: 2px solid black;
          width: 100vw;
          /* vw viewport is max px in ur pc supported */
          background-color: aqua;
}
    </style>
</head>

<body>
    <div class="box">
         this is a box
    </div>
</body>
</html>
