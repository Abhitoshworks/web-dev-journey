<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <img width="100" height="100" src="pfp.jpg" alt="meme">
    <!-- ctrl + / to comment -->
     <!-- header top pe chize add krta -->
     <header>
        <h1>Student info</h1>
     </header>
     <table>
     <tr>
        <caption>Student details</caption>
        <th>Name</th>
        <th>Branch</th>
        <th>Roll number</th>
        <th>University</th>
     </tr>
     <tr>
     <td>Abhitosh</td>
     <td>ECE</td>
     <td>2025293205</td>
     <td>Kurukshetra university</td>
     </tr>
     <tr>
        <td>Saksham</td>
        <td>ECE</td>
        
        <td colspan="2">KuK</td>
        <!-- kuk ab 2 column ki jagah lega, aur
         rowspan se kitne row ghere ga  -->
     </tr>
</table>
<!-- footer neeche chize add krta copyright wagera jaise -->
<footer>
    <p>#kuk uni</p>
</footer>
<!-- unordered list me sirf shape(circle square disc) se count hota  -->
<ul type="circle">
   <li>Abhitosh</li> 
    <li>Lovish</li>
    <li>Saksham</li>
    <li>Anurag</li>
</ul>


<!-- ordered list me number (1.Abhitosh 2.Anu)aise hota ya variables 
 (A.Abhitosh B.Anu) ya roman numbers-->

 <!-- Uppercase Roman Numerals: Use type="I"
Lowercase Roman Numerals: Use type="i"
Arabic Numerals: Use type="1" (This is the default if the type attribute is not specified)
Lowercase Alphabetical Letters: Use type="a"
Uppercase Alphabetical Letters: Use type="A" -->

  <ol type="A">
    <li>Abhitosh</li> 
    <li>Lovish</li>
    <li>Saksham</li>
    <li>Anurag</li>
 </ol>
 <!-- defination list works as word and uski defination -->
 <dl> 
    <dt>Abhitosh</dt>   <!-- defination term -->
    <dd>Abhitosh is a good boy</dd> <!--defination ki defination-->
 </dl>
</body>
</html>
