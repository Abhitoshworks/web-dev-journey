<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS shadows and outline</title>
</head>
<style>
    .box{
        border: 2px solid black;
        box-shadow: 5px 15px 5px grey;
        outline: 2px solid pink;
        /* outline space nhi leta */
    }
    .text{
        text-shadow: 2px 2px 4px;
        
    }
</style>
<body>
   <div class="box">
    i am a box
   </div>
   <p class="text">
    years ago when i was younger i kinda a liked a girl i knew she was mine 
    and we were sweet hearts that was then but then its true
   </p>
</body>
</html>
