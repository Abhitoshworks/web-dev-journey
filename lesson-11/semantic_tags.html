<!-- MUST-KNOW SEMANTIC TAGS -->

<header>
  <!-- Site logo, main heading, or top-level navigation -->
</header>

<nav>
  <!-- Main navigation links (menus) -->
</nav>
<!-- nav tag ka design se koi lena-dena nahi hai. Iska sirf ek kaam hai:
browser ya Google ko bolna ki "Bhai, iske andar mere website ka main menu (links) ha  -->
<main>
  <!-- The primary content of the page. Use this ONLY ONCE per page. -->
  
  <section>
    <!-- A distinct, grouped section of content (usually needs its own heading) -->
  </section>

  <article>
    <!-- Independent, self-contained content (like a blog post, forum post, or news widget) -->
  </article>

</main>

<aside>
  <!-- Sidebar content, indirectly related to the main stuff (ads, related links, author bio) -->
</aside>

<footer>
  <!-- Copyright info, legal links, bottom navigation -->
</footer>
