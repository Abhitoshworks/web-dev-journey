<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS media query</title>
    <style>
        body {
            background-color: red;
        }
      /* revise krte huye tumhe max width ka concept pta honga chiye ki max width hi q */
        @media only screen and (max-width:455px) {
            body {
                background-color: rgb(42, 47, 198);
            }
                     .boxes{flex-direction: column;}
        
        }
        @media screen and (orientation: landscape){
            /* width jada landscape aur length jaga potrait*/
        body{
            border: 4px solid purple;
            /* landscape ki wajah se jab tak row rahega tab tak border rahega
               responsive se use pichkao wo colum banega toh border hatjayega */
            /* agar landscape ki jagah potrait krte toh jab pichak ke column banta tab ata ye border  */
        }
    }

            /* jab ham iska size inspect krke chota krenge 455px tak tab background color red se blue hojayega
           responsive pe set krna mat bhulna */
        

        /* @media not|only mediatype and (expressions) {
             CSS-Code;
                       } */
        .boxes{
        display: flex;}

        .box {
            height: 344px;
            width: 344px;
            background-color: steelblue;
            padding: 3px;
            margin: 3px; 
        }
    </style>
</head>

<body>
    <div>
        hey im red body color
    </div>
    <div class="boxes">
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
    </div>

</body>

</html>
