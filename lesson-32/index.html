<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pamphlet</title>

<style>
body{
    background: grey;
    margin: 0;
}

.container{
    position: relative;
    width: 344px;
    margin: 80px auto;
}

.white{
    width: 344px;
    height: 444px;
    background: white;
    border-radius: 14px;
    position: relative;
    z-index: 1;
}

img{
    width: 280px;
    border-radius: 14px;
    position: absolute;
    top: 25px;      /* White card ke upar overlap */
    left: 50%;
    transform: translateX(-50%);
    z-index: 2;
}
</style>
</head>

<body>

<div class="container">
    <div class="white"></div>
    <img src="hellokitty.png" alt="Hello Kitty">
</div>

</body>
</html>
